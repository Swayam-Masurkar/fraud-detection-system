name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint
        run: flake8 src/ --max-line-length=110 --extend-ignore=E203,W503

      - name: Generate a small synthetic dataset for tests
        run: python src/generate_data.py --n 200 --seed 1 --out data

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Smoke-test training pipeline
        run: python -m src.train --data data/insurance_claims.csv --model-dir models
